services:
  setup:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "cd backend && npm install && cd ../frontend && npm install"

  dev:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - .:/app
      - /app/backend/node_modules
      - /app/frontend/node_modules
    command: >
      sh -c "cd backend && npx tsx watch src/index.ts &
             cd ../frontend && npx vite --host 0.0.0.0"

  test:
    image: node:22-alpine
    working_dir: /app/backend
    environment:
      NODE_ENV: test
    volumes:
      - .:/app
    command: sh -c "npm install && npx vitest run"

  build:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "npm install && npx tsc"

  typecheck:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "npm install && npx tsc --noEmit"

  lint:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "npm install && npx eslint src/ tests/"

  format:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "npm install && npx prettier --check src/ tests/"
