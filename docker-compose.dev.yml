services:
  setup:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "cd backend && npm install && cd ../frontend && npm install"

  dev:
    image: node:22-alpine
    working_dir: /app
    environment:
      MCP_CONFIG_PATH: ${MCP_CONFIG_PATH:-/app/.mcp.json}
      MCP_CONNECTION_TIMEOUT: ${MCP_CONNECTION_TIMEOUT:-5000}
      MCP_ADD_TIMEOUT: ${MCP_ADD_TIMEOUT:-30000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - .:/app
      - /app/backend/node_modules
      - /app/frontend/node_modules
    command: >
      sh -c "
        npm install --prefix /app/backend &&
        npm install --prefix /app/frontend &&
        (cd /app/backend && npx tsx watch src/index.ts &) &&
        cd /app/frontend && exec npx vite --host 0.0.0.0
      "

  test:
    image: node:22-alpine
    working_dir: /app/backend
    environment:
      NODE_ENV: test
      MCP_CONNECTION_TIMEOUT: ${MCP_CONNECTION_TIMEOUT:-5000}
      MCP_ADD_TIMEOUT: ${MCP_ADD_TIMEOUT:-30000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    command: sh -c "npm install && npx vitest run"

  docker-test:
    image: docker:28-cli
    working_dir: /app/backend
    environment:
      NODE_ENV: test
      MCP_CONNECTION_TIMEOUT: ${MCP_CONNECTION_TIMEOUT:-5000}
      MCP_ADD_TIMEOUT: ${MCP_ADD_TIMEOUT:-30000}
      DOCKER_HOST: unix:///var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: host
    command: >
      sh -c "
        apk add --no-cache nodejs npm &&
        cd /app/backend &&
        npm install &&
        npx vitest run tests/integration/docker.test.ts
      "
    profiles:
      - validation

  build:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "npm install && npx tsc"

  typecheck:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "npm install && npx tsc --noEmit"

  lint:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "npm install && npx eslint src/ tests/"

  format:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "npm install && npx prettier --check src/ tests/"

  prod:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ${MCP_CONFIG_SOURCE:-./.mcp.json}:/app/.mcp.json
    profiles:
      - validation
