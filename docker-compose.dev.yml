# docker-compose.dev.yml — git-spec-kit (Specify CLI) em container de desenvolvimento
services:
  spec-kit:
    image: python:3.12-slim
    container_name: spec-kit
    working_dir: /workspace
    volumes:
      # Monta o diretório atual para que os artefatos do spec-kit fiquem no host
      - .:/workspace
    # entrypoint = preparo do ambiente (git + uv + Specify CLI), só na 1ª vez
    entrypoint: >
      bash -c "command -v specify >/dev/null ||
      { apt-get update -qq && apt-get install -y -qq --no-install-recommends git &&
      pip install -q uv && uv tool install -q git+https://github.com/github/spec-kit.git &&
      ln -sf /root/.local/bin/specify /usr/local/bin/specify; };
      exec \"$@\"" --
    # command = mantém o container vivo; rode o framework via 'docker compose exec'
    command: sleep infinity
    tty: true
    stdin_open: true
