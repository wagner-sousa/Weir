schema_version: "1.0"

preset:
  id: "companion-turbo"
  name: "Companion Turbo"
  version: "1.0.0"
  description: "Turbo spec-kit pipeline: no user stories, files/dependencies tasks, smaller spec folder, with Companion timing baked in."
  author: "alfredoperez"
  repository: "https://github.com/alfredoperez/speckit-companion"
  license: "MIT"

requires:
  speckit_version: ">=0.8.5"

provides:
  templates:
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Turbo specify — no user-story section"
      replaces: "speckit.specify"
    - type: "command"
      name: "speckit.clarify"
      file: "commands/speckit.clarify.md"
      description: "Turbo clarify — ≤3 targeted questions"
      replaces: "speckit.clarify"
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Turbo plan — files/deps, conditional side files"
      replaces: "speckit.plan"
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Turbo tasks — files/dependencies axis"
      replaces: "speckit.tasks"
    - type: "command"
      name: "speckit.analyze"
      file: "commands/speckit.analyze.md"
      description: "Turbo analyze — lightweight consistency pass"
      replaces: "speckit.analyze"
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Turbo implement — dependency-ordered execution"
      replaces: "speckit.implement"
    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Turbo constitution — principles without the propagation ceremony"
      replaces: "speckit.constitution"

tags:
  - "companion"
  - "turbo"
  - "no-user-stories"
  - "files-deps"
