schema_version: "1.0"

extension:
  id: "conduct"
  name: "Conduct Extension"
  version: "1.0.1"
  description: "Executes a single spec-kit phase via sub-agent delegation to reduce context pollution."
  author: "twbrandon7"
  repository: "https://github.com/twbrandon7/spec-kit-conduct-ext"
  license: "MIT"
  homepage: "https://github.com/twbrandon7/spec-kit-conduct-ext"

requires:
  speckit_version: ">=0.3.1"
  commands:
    - "speckit.specify"
    - "speckit.plan"
    - "speckit.tasks"
    - "speckit.implement"
  scripts:
    - "scripts/bash/common.sh"
    - "scripts/powershell/common.ps1"

provides:
  commands:
    - name: "speckit.conduct.run"
      file: "commands/conduct.md"
      description: "Executes a single spec-kit phase by delegating its steps to specialized sub-agents sequentially."
  config:
    - name: "conduct-config.yml"
      template: "conduct-config.template.yml"
      required: true


tags:
  - "conduct"
  - "workflow"
  - "automation"
